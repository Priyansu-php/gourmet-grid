<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | Gourmet Grid</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .auth-card {
            width: 100%;
            max-width: 400px;
        }
        .toggle-auth {
            text-align: center;
            margin-top: 1rem;
            color: var(--accent-color);
            cursor: pointer;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">Gourmet Grid <span class="dot">.</span></div>
        <div class="nav-links">
            <a href="index.html">Home</a>
        </div>
    </nav>

    <div class="auth-container">
        <div class="glass-card auth-card" id="login-section">
            <h2 style="text-align: center; margin-bottom: 2rem;">Welcome Back</h2>
            <form id="login-form">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="login-email" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="login-password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Sign In</button>
            </form>
            <p class="toggle-auth" onclick="toggleView('register')">Don't have an account? Sign up</p>
        </div>

        <div class="glass-card auth-card" id="register-section" style="display: none;">
            <h2 style="text-align: center; margin-bottom: 2rem;">Create Account</h2>
            <form id="register-form">
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" id="reg-name" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="reg-email" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="reg-password" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Role</label>
                    <select id="reg-role" class="form-control">
                        <option value="customer">Customer</option>
                        <option value="restaurant">Restaurant Owner</option>
                        <option value="delivery">Delivery Personnel</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Sign Up</button>
            </form>
            <p class="toggle-auth" onclick="toggleView('login')">Already have an account? Sign in</p>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        function toggleView(view) {
            document.getElementById('login-section').style.display = view === 'login' ? 'block' : 'none';
            document.getElementById('register-section').style.display = view === 'register' ? 'block' : 'none';
        }

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;

            try {
                const res = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                
                if(res.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = 'index.html';
                } else {
                    alert(data.message);
                }
            } catch(err) {
                console.error(err);
                alert('Error logging in');
            }
        });

        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('reg-name').value;
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-password').value;
            const role = document.getElementById('reg-role').value;

            try {
                const res = await fetch(`${API_URL}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password, role })
                });
                const data = await res.json();
                
                if(res.ok) {
                    alert('Registration successful! Please log in.');
                    toggleView('login');
                } else {
                    alert(data.message);
                }
            } catch(err) {
                console.error(err);
                alert('Error registering');
            }
        });
    </script>
</body>
</html>
